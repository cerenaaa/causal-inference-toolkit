name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pandas scipy statsmodels scikit-learn pytest
      - name: Test DiD estimator
        run: |
          python - <<'PYEOF'
          from data.synthetic_experiments import generate_panel_data
          from methods.did import DifferenceInDifferences
          df = generate_panel_data(n_units=60, n_periods=6, treatment_effect=5.0)
          result = DifferenceInDifferences().fit(df)
          assert abs(result.att - 5.0) < 2.0, f'ATT too far from truth: {result.att}'
          assert result.se > 0
          print('DiD OK, ATT =', result.att)
          PYEOF
      - name: Test PSM estimator
        run: |
          python - <<'PYEOF'
          from data.synthetic_experiments import generate_observational_data
          from methods.psm import PropensityScoreMatching
          df = generate_observational_data(n=500, treatment_effect=3.0)
          result = PropensityScoreMatching(caliper=0.2).fit(df, 'treated', 'outcome', ['age', 'income'])
          assert result.n_matched_treated > 0
          assert result.post_match_smd < result.pre_match_smd
          print('PSM OK, ATT =', result.att, 'balance improved =', result.post_match_smd < result.pre_match_smd)
          PYEOF
      - name: Test 2SLS estimator
        run: |
          python - <<'PYEOF'
          import numpy as np
          import pandas as pd
          rng = np.random.default_rng(42)
          n = 500
          z = rng.binomial(1, 0.5, n)
          t = 0.7 * z + 0.3 * rng.standard_normal(n)
          y = 2.0 * t + rng.standard_normal(n)
          df = pd.DataFrame(dict(z=z, treatment=t, outcome=y))
          from methods.iv import TwoStageLeastSquares
          result = TwoStageLeastSquares().fit(df, 'outcome', 'treatment', 'z')
          assert abs(result.late - 2.0) < 1.5
          print('2SLS OK, LATE =', result.late)
          PYEOF
